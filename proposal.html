<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#111;
color:white;
}

.proposal{
text-align:center;
padding:40px;
}

.big-heart{
font-size:90px;
animation:beat 1s infinite;
margin-bottom:20px;
}

.question{
font-size:38px;
line-height:1.5;
margin:30px 0;
}

.btn{
display:inline-block;
padding:15px 30px;
margin:15px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
text-decoration:none;
background:#ff3b6b;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

#result{
margin-top:40px;
font-size:22px;
line-height:1.7;
}

</style>

</head>

<body>

<div class="proposal">

<div class="big-heart">❤️</div>

<h1>Riti...</h1>

<div class="question">

Will you be my forever? ❤️

</div>

<button class="btn" onclick="yesAnswer()">

💖 Yes

</button>

<button class="btn" onclick="timeAnswer()">

🌸 I need some time

</button>

<div id="result"></div>

</div>

<script>
function yesAnswer(){

document.getElementById("result").innerHTML = `
<h2>❤️ Thank You, Riti ❤️</h2>

<p>You just made Nikhil the happiest person. 🥹❤️</p>

<br>

<a class="btn"
href="https://wa.me/919309783681?text=Hi%20Nikhil%20❤️%0A%0AMy%20answer%20is%20YES.%20😊">

💌 Share My Answer

</a>
`;

}

function timeAnswer(){

document.getElementById("result").innerHTML = `
<h2>🌸 Thank You ❤️</h2>

<p>Take all the time you need.<br>
I'll always respect your decision.</p>

<br>

<a class="btn"
href="https://wa.me/919309783681?text=Hi%20Nikhil%20❤️%0A%0AI%20need%20some%20time%20before%20answering.%20🌸">

💌 Share My Answer

</a>
`;

}
</script>

</script>

</body>
</html>
